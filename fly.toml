app = "the-wire-hadi"
primary_region = "iad"

[build]

[http_service]
  internal_port = 2424
  force_https = true
  # Display-first service (no model in cloud) — fine to scale to zero and cold-start.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
